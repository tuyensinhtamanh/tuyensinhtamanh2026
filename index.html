<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trợ lý Tuyển sinh CAND 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .header-gradient { background: linear-gradient(180deg, #b20a0a 0%, #e61919 100%); }
        .chat-container { background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; height: calc(100vh - 180px); }
        .hidden { display: none; }
        .modal-active { transform: translateY(0) !important; }
    </style>
</head>
<body class="max-w-md mx-auto shadow-2xl min-h-screen flex flex-col bg-white relative overflow-hidden">

    <header class="header-gradient text-white p-5 text-center relative shadow-md">
        <button onclick="toggleModal()" class="absolute right-4 top-5 bg-yellow-500/30 p-2 rounded-lg border border-yellow-400/50">
            <i class="fas fa-list-ul text-yellow-300"></i>
        </button>
        <p class="text-[10px] font-bold tracking-[0.2em] opacity-80 uppercase">Công an xã Tam Anh</p>
        <h1 class="text-lg font-bold mt-1 uppercase">Tuyển sinh CAND 2026</h1>
    </header>

    <main class="chat-container flex-grow p-4 overflow-y-auto" id="chat-box">
        <div class="bg-red-50 p-4 rounded-xl border-l-4 border-red-600 shadow-sm mb-4">
            <p class="text-sm text-gray-800">🫡 Chào đồng chí! Tôi đã nạp toàn bộ dữ liệu <b>Tuyển sinh 2026</b> từ Phòng PX01. Đồng chí cần tra cứu gì? (Ví dụ: <i>chỉ tiêu T01, điều kiện sức khỏe, mã bài thi...</i>)</p>
        </div>
        <div id="messages" class="space-y-4"></div>
    </main>

    <footer class="p-4 bg-gray-50 flex items-center gap-2 border-t">
        <input type="text" id="userInput" placeholder="Hỏi về chỉ tiêu, mã bài, sức khỏe..." class="flex-grow p-3 rounded-2xl border border-gray-300 text-sm focus:outline-none">
        <button onclick="handleSearch()" class="bg-red-600 text-white p-3 rounded-2xl shadow-lg"><i class="fas fa-search"></i></button>
    </footer>

    <div id="data-modal" class="fixed inset-0 bg-white z-[100] flex flex-col translate-y-full transition-transform duration-300 shadow-2xl">
        <div class="header-gradient p-4 flex justify-between items-center text-white">
            <h2 class="font-bold uppercase text-sm">Tra cứu nhanh dữ liệu</h2>
            <button onclick="toggleModal()" class="text-2xl">&times;</button>
        </div>
        <div class="flex border-b text-[11px] font-bold uppercase text-gray-500 bg-white">
            <button onclick="showTab('suc-khoe')" class="flex-1 py-4 text-center border-b-2 border-red-600 text-red-600">Sức khỏe</button>
            <button onclick="showTab('chi-tieu')" class="flex-1 py-4 text-center">Chỉ tiêu</button>
            <button onclick="showTab('lien-he')" class="flex-1 py-4 text-center">Liên hệ</button>
        </div>
        <div id="modal-content" class="p-4 overflow-y-auto flex-grow bg-gray-50 space-y-4">
            </div>
    </div>

    <script>
        // "TÚI KHÔN" ĐƯỢC TRÍCH XUẤT TỪ FILE CỦA BẠN
        const DATABASE = [
            { key: ["chi tiêu", "t01", "an ninh"], content: "<b>Học viện An ninh nhân dân (T01):</b> Tổng 500 chỉ tiêu. Trong đó: Nghiệp vụ An ninh (Phía Bắc): 250; An ninh mạng (Toàn quốc): 150; CNTT (Toàn quốc): 100." },
            { key: ["chi tiêu", "t02", "cảnh sát"], content: "<b>Học viện Cảnh sát nhân dân (T02):</b> 400 chỉ tiêu Nhóm ngành nghiệp vụ Cảnh sát (Phía Bắc)." },
            { key: ["sức khỏe", "chiều cao", "bmi"], content: "<b>Tiêu chuẩn sức khỏe:</b> Đủ tiêu chuẩn theo Thông tư 62/2023/TT-BCA. BMI từ 18.5 đến 30. Chiều cao Nam 1m64-1m95, Nữ 1m58-1m80 (Ưu tiên dân tộc thiểu số)." },
            { key: ["mã bài thi", "ca1", "ca2", "ca3", "ca4"], content: "<b>Mã bài thi Bộ Công an:</b> CA1 (Toán, Văn, Sử, Anh + Lý), CA2 (+ Hóa), CA3 (+ Sinh), CA4 (+ Địa). Thời gian: 180 phút. Ngày thi: 21/6/2026." },
            { key: ["trung cấp", "t08", "t09", "t10"], content: "<b>Chỉ tiêu Trung cấp:</b> T08 (Toàn quốc): 80; T09 (Phía Bắc): 100; T10 (Phía Nam): Đang cập nhật." },
            { key: ["liên hệ", "số điện thoại"], content: "<b>Thông tin hỗ trợ:</b> Cán bộ tuyển sinh Đại úy Phạm Đình Nga - SĐT: 0905.771.287." },
            { key: ["văn bằng 2", "vb2"], content: "<b>Tuyển sinh VB2:</b> T01 (130 chỉ tiêu), T02 (100 chỉ tiêu), T04 (100 chỉ tiêu). Thi tuyển ngày 20/9/2026 trên máy tính." }
        ];

        function toggleModal() {
            document.getElementById('data-modal').classList.toggle('modal-active');
            showTab('suc-khoe');
        }

        function showTab(type) {
            let html = "";
            if(type === 'suc-khoe') {
                html = `<div class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-red-600">
                    <h3 class="font-bold text-red-700 text-xs uppercase">● Chiều cao & BMI</h3>
                    <p class="text-sm mt-2 text-gray-700">- Nam: 1m64 - 1m95<br>- Nữ: 1m58 - 1m80<br>- BMI: 18.5 - 30</p>
                </div>`;
            } else if(type === 'chi-tieu') {
                html = `<div class="space-y-2">
                    <div class="bg-white p-3 rounded shadow-sm text-sm"><b>T01:</b> 500 chỉ tiêu</div>
                    <div class="bg-white p-3 rounded shadow-sm text-sm"><b>T02:</b> 400 chỉ tiêu</div>
                    <div class="bg-white p-3 rounded shadow-sm text-sm"><b>T06:</b> 200 chỉ tiêu</div>
                </div>`;
            } else {
                html = `<p class="text-sm text-gray-600">Mọi thắc mắc liên hệ: <b>0905.771.287</b> (Đ/c Nga)</p>`;
            }
            document.getElementById('modal-content').innerHTML = html;
        }

        function handleSearch() {
            const input = document.getElementById('userInput');
            const query = input.value.toLowerCase();
            if(!query) return;

            addMessage(input.value, 'user');
            
            let result = "Xin lỗi, tôi chưa tìm thấy thông tin này trong file dữ liệu 2026. Đồng chí vui lòng liên hệ 0905.771.287 để được giải đáp trực tiếp.";
            
            for(let item of DATABASE) {
                if(item.key.some(k => query.includes(k))) {
                    result = item.content;
                    break;
                }
            }

            setTimeout(() => addMessage(result, 'bot'), 500);
            input.value = "";
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `<div class="${sender === 'user' ? 'bg-red-600 text-white' : 'bg-gray-100 text-gray-800'} p-3 rounded-2xl max-w-[80%] text-sm shadow-sm">${text}</div>`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        }

        document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSearch(); });
    </script>
</body>
</html>
