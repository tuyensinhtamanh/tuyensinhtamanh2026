<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trợ lý ảo Tuyển sinh - Công an xã Tam Anh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f1f5f9; font-family: 'Segoe UI', sans-serif; }
        .header-gradient { background: linear-gradient(180deg, #b20a0a 0%, #e61919 100%); }
        .chat-container { background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; height: calc(100vh - 280px); }
        .message-bubble { position: relative; border-left: 4px solid #e61919; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="max-w-md mx-auto shadow-2xl min-h-screen flex flex-col bg-white">
    <header class="header-gradient text-white p-5 text-center relative shadow-md">
        <p class="text-[10px] font-bold tracking-[0.2em] opacity-80 uppercase">Trợ lý ảo</p>
        <h1 class="text-xl font-bold mt-1 uppercase">Tuyển sinh CAND Năm 2026</h1>
        <p class="text-sm font-semibold mt-1 text-yellow-300">CÔNG AN XÃ TAM ANH</p>
    </header>

    <main class="chat-container flex-grow p-4 overflow-y-auto">
        <div class="flex flex-col items-center mb-6 mt-2">
            <div class="relative">
                <img src="avatar.png" alt="Avatar" class="w-24 h-24 rounded-full border-4 border-white shadow-lg object-cover">
                <span class="absolute bottom-1 right-2 w-4 h-4 bg-green-500 border-2 border-white rounded-full"></span>
            </div>
            <p class="text-[10px] text-gray-500 font-bold mt-2 uppercase tracking-widest">Sẵn sàng hỗ trợ</p>
        </div>

        <div class="message-bubble bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-4">
            <p class="font-bold text-gray-800 mb-2 text-sm">Xin chào! Tôi là trợ lý ảo tuyển sinh của Công an xã Tam Anh.</p>
            <p class="text-gray-700 text-sm leading-relaxed">Đồng chí, thí sinh hoặc phụ huynh cần tìm hiểu thông tin gì về kỳ tuyển sinh CAND năm 2026? Hãy chọn các mục bên dưới hoặc nhập câu hỏi nhé.</p>
        </div>
    </main>

    <div class="bg-white px-2 py-3 border-t">
        <div class="flex overflow-x-auto space-x-2 no-scrollbar px-2">
            <button class="whitespace-nowrap px-4 py-2 bg-red-50 border border-red-100 rounded-full text-red-700 font-bold text-xs">ĐẠI HỌC</button>
            <button class="whitespace-nowrap px-4 py-2 bg-red-50 border border-red-100 rounded-full text-red-700 font-bold text-xs">TRUNG CẤP</button>
            <button class="whitespace-nowrap px-4 py-2 bg-red-50 border border-red-100 rounded-full text-red-700 font-bold text-xs">SỨC KHỎE</button>
        </div>
    </div>

    <footer class="p-4 bg-gray-50 flex items-center gap-2 border-t">
        <input type="text" placeholder="Nhập câu hỏi..." class="flex-grow p-3 rounded-2xl border border-gray-300 text-sm focus:outline-none">
        <button class="bg-red-600 text-white p-3 rounded-2xl shadow-lg"><i class="fas fa-paper-plane"></i></button>
    </footer>
</body>
</html>
