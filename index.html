<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trợ lý Tuyển sinh CAND 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f1f5f9; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        .header-red { background: linear-gradient(180deg, #b20a0a 0%, #e61919 100%); }
        .chat-area { height: calc(100vh - 280px); background-color: #f8fafc; }
        .bot-msg { background: white; border: 1px solid #e2e8f0; border-radius: 18px 18px 18px 2px; align-self: flex-start; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .user-msg { background: #e61919; color: white; border-radius: 18px 18px 2px 18px; align-self: flex-end; }
        .suggest-btn { border: 1px solid #e61919; color: #e61919; padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 600; background: white; margin-top: 8px; margin-right: 6px; transition: all 0.2s; display: inline-block; }
        .suggest-btn:active { background: #fff5f5; transform: scale(0.95); }
        .nav-btn { whitespace: nowrap; padding: 8px 20px; background-color: #fff5f5; border: 1px solid #fed7d7; color: #c53030; font-weight: bold; font-size: 11px; border-radius: 9999px; transition: 0.2s; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="max-w-md mx-auto shadow-2xl min-h-screen flex flex-col bg-white relative">

    <header class="header-red text-white p-5 text-center shadow-lg">
        <p class="text-[10px] font-bold tracking-widest opacity-80 uppercase">Trợ lý ảo</p>
        <h1 class="text-xl font-bold mt-1 uppercase">Tuyển sinh CAND 2026</h1>
        <p class="text-[11px] font-semibold text-yellow-300">CÔNG AN TỈNH QUẢNG TRỊ</p>
    </header>

    <main id="chatBox" class="chat-area p-4 overflow-y-auto flex flex-col gap-4">
        <div class="bot-msg p-4 max-w-[95%]">
            <p class="text-sm text-gray-800 leading-relaxed">
                Chào đồng chí! Tôi là trợ lý hỗ trợ tra cứu nhanh về: <b>đối tượng, điều kiện, thời gian, hồ sơ, lệ phí, VB2CA, trung cấp, sức khỏe và thể lực.</b>
            </p>
        </div>
        <div id="history" class="flex flex-col gap-4"></div>
    </main>

    <div class="bg-white px-2 py-3 border-t">
        <div class="flex overflow-x-auto space-x-2 no-scrollbar px-2">
            <button onclick="askData('Đại học')" class="nav-btn uppercase">Đại học</button>
            <button onclick="askData('VB2CA')" class="nav-btn uppercase">VB2CA</button>
            <button onclick="askData('Trung cấp')" class="nav-btn uppercase">Trung cấp</button>
            <button onclick="askData('Thời gian')" class="nav-btn uppercase">Thời gian</button>
            <button onclick="askData('Thể lực')" class="nav-btn uppercase">Thể lực</button>
        </div>
    </div>

    <footer class="p-4 bg-gray-50 border-t flex items-center gap-2">
        <input type="text" id="userInput" placeholder="Nhập nội dung cần tra cứu..." class="flex-grow p-3 rounded-2xl border border-gray-300 text-sm focus:outline-none">
        <button onclick="handleManualSend()" class="bg-red-600 text-white p-3 rounded-2xl shadow-lg active:scale-90 transition">
            <i class="fas fa-paper-plane"></i>
        </button>
    </footer>

    <script>
        const FLOW_DATA = {
            "đại học": {
                text: "<b>Đại học chính quy tuyển mới:</b><br>• Đối tượng: Chiến sĩ nghĩa vụ tại ngũ, học sinh tốt nghiệp THPT.<br>• Phương thức: PT1 tuyển thẳng; PT2 chứng chỉ ngoại ngữ; PT3 điểm thi THPT + bài thi Bộ Công an.<br>• Tổng chỉ tiêu: 1.870.",
                suggests: ["Chỉ tiêu từng trường?", "Điều kiện sơ tuyển?"]
            },
            "vb2ca": {
                text: "<b>Đại học VB2 (Dành cho người đã có bằng Đại học):</b><br>• Đối tượng: Công dân Việt Nam tốt nghiệp đại học ngoài ngành.<br>• Chỉ tiêu: 330 (T01: 130, T02: 100, T04: 100).<br>• Thời gian thi: Dự kiến 150 phút, ngày 15/6/2026.",
                suggests: ["Danh mục ngành đào tạo?", "Lệ phí dự tuyển?"]
            },
            "trung cấp": {
                text: "<b>Hệ Trung cấp CAND:</b><br>• T08 (An ninh): 80 chỉ tiêu.<br>• T09 (Cảnh sát I): 100 chỉ tiêu.<br>• T10 (Cảnh sát II): 100 chỉ tiêu.",
                suggests: ["Tổ hợp xét tuyển trung cấp?"]
            },
            "thời gian": {
                text: "<b>Lịch trình dự kiến 2026:</b><br>• Tháng 3-4: Đăng ký sơ tuyển tại Công an xã/huyện.<br>• Tháng 6: Thi bài thi đánh giá của Bộ Công an.<br>• Tháng 7-8: Xét tuyển và công bố kết quả.",
                suggests: ["Hồ sơ gồm những gì?", "Liên hệ cán bộ hỗ trợ?"]
            },
            "thể lực": {
                text: "<b>Tiêu chuẩn sức khỏe & thể lực:</b><br>• Chiều cao: Nam ≥ 1m64, Nữ ≥ 1m58.<br>• BMI: 18.5 đến dưới 30.<br>• Mắt: Không quá 3 diop, không loạn thị.",
                suggests: ["Ưu tiên người dân tộc?", "Sơ tuyển tại đâu?"]
            },
            // DỮ LIỆU CÂU HỎI PHỤ (BẤM NÚT GỢI Ý)
            "chỉ tiêu từng trường?": { text: "Chi tiết chỉ tiêu Phụ lục 01:<br>- T01: 500 (250 Nghiệp vụ AN, 150 AN mạng, 100 Y khoa).<br>- T02: 500.<br>- T06: 200.<br>- T07: 300.", suggests: ["Mã bài thi CA1, CA2?"] },
            "hồ sơ gồm những gì?": { text: "Hồ sơ sơ tuyển bao gồm: (1) Phiếu đăng ký, (2) Khai sinh, (3) CCCD, (4) Học bạ THPT, (5) Giấy xác nhận Đoàn/Đảng.", suggests: ["Địa điểm nộp hồ sơ?"] },
            "liên hệ cán bộ hỗ trợ?": { text: "Mọi thắc mắc đồng chí liên hệ <b>Đại úy Phạm Đình Nga</b> (PX01). SĐT: <b>0905.771.287</b>.", suggests: ["Quay lại menu chính"] }
        };

        function askData(key) {
            const query = key.toLowerCase();
            renderMessage(key, 'user');
            
            setTimeout(() => {
                const data = FLOW_DATA[query];
                if (data) {
                    let html = `<div>${data.text}</div>`;
                    if (data.suggests) {
                        html += `<div class="mt-2">`;
                        data.suggests.forEach(s => {
                            html += `<button onclick="askData('${s}')" class="suggest-btn">${s}</button>`;
                        });
                        html += `</div>`;
                    }
                    renderMessage(html, 'bot');
                } else {
                    renderMessage("Tôi chưa có dữ liệu chi tiết về mục này. Đồng chí vui lòng gọi 0905.771.287 để được hỗ trợ.", 'bot');
                }
            }, 400);
        }

        function handleManualSend() {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if(!val) return;
            askData(val);
            input.value = "";
        }

        function renderMessage(content, type) {
            const history = document.getElementById('history');
            const div = document.createElement('div');
            div.className = `flex ${type === 'user' ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `<div class="${type === 'user' ? 'user-msg' : 'bot-msg'} p-3 max-w-[95%] text-sm shadow-sm">${content}</div>`;
            history.appendChild(div);
            document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
        }
    </script>
</body>
</html>
